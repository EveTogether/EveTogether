name: Feature request
description: Suggest an idea — please open one before sending a PR for non-trivial work
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: checkboxes
    id: principles
    attributes:
      label: Project principles
      description: "See AGENTS.md — local-first, no central server/SaaS, data-minimising, no code copied from other tools."
      options:
        - label: My idea fits the project principles in AGENTS.md
          required: true
