<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>EVE Together — Live DPS widget (sample)</title>
<style>
  :root { --accent:#4EC79E; --in:#E3733B; --dim:#8b949e; --panel:#161b22; --border:#2a313c; }
  * { box-sizing:border-box; }
  /* Transparent background so it drops straight into an OBS browser source; give it a colour to preview standalone. */
  body { margin:0; font:15px/1.4 system-ui,Segoe UI,Roboto,sans-serif; color:#e6edf3; background:#0d1117; }
  .wrap { padding:18px; }
  .status { font-size:12px; color:var(--dim); margin-bottom:10px; }
  .status b { color:var(--accent); }
  .card { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:14px 16px; margin:8px 0; min-width:240px; }
  .name { font-size:15px; font-weight:600; margin-bottom:8px; }
  .row { display:flex; justify-content:space-between; align-items:baseline; margin:3px 0; }
  .label { color:var(--dim); font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
  .out { color:var(--accent); font-variant-numeric:tabular-nums; font-size:28px; font-weight:700; }
  .in  { color:var(--in);     font-variant-numeric:tabular-nums; font-size:20px; font-weight:600; }
  .muted { color:var(--dim); }
  .empty { color:var(--dim); font-style:italic; padding:10px 2px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="status">EVE Together live DPS — <span id="state">connecting…</span> · <b id="src">{{BASE_URL}}/ws</b></div>
  <div id="meters"><div class="empty">Waiting for a running character…</div></div>
</div>
<script>
  // --- Minimal, dependency-free example: read the always-on own-character metrics off the WebSocket stream. ---
  const WS_URL = "{{BASE_URL}}/ws".replace(/^http/, "ws");
  const meters = document.getElementById("meters");
  const state = document.getElementById("state");

  const fmt = (n) => Math.round(n || 0).toLocaleString();

  function render(metrics) {
    if (!metrics || metrics.length === 0) {
      meters.innerHTML = '<div class="empty">No running character — start EVE and undock.</div>';
      return;
    }
    meters.innerHTML = metrics.map(m => `
      <div class="card">
        <div class="name">${m.characterName ?? ("Char " + m.characterId)}</div>
        <div class="row"><span class="label">DPS out</span><span class="out">${fmt(m.dpsOut)}</span></div>
        <div class="row"><span class="label">DPS in</span><span class="in">${fmt(m.dpsIn)}</span></div>
        ${m.location ? `<div class="row"><span class="label">System</span><span class="muted">${m.location}</span></div>` : ""}
      </div>`).join("");
  }

  function connect() {
    const ws = new WebSocket(WS_URL);
    ws.onopen = () => { state.textContent = "connected"; };
    ws.onclose = () => { state.textContent = "disconnected — retrying…"; setTimeout(connect, 2000); };
    ws.onerror = () => ws.close();
    ws.onmessage = (e) => {
      const evt = JSON.parse(e.data);              // { type, data, ts }
      if (evt.type === "snapshot") render(evt.data.metrics);   // initial state on connect
      else if (evt.type === "metrics") render(evt.data);       // 1 Hz own-character tick
      // evt.type === "fleet.metrics" / "fleet.changed" also arrive while you are in a fleet.
    };
  }
  connect();
</script>
</body>
</html>
